<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habibs Hair & Beauty Salon | Nagpur</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --habibs-red: #e61e25;
            --dark-bg: #050505;
        }

        body { background: var(--dark-bg); color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Video Header */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.5);
        }

        .logo-box { text-align: center; z-index: 1; }

        .logo-main {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            color: var(--habibs-red);
            text-shadow: 2px 2px 0px #fff, 4px 4px 15px rgba(230, 30, 37, 0.7);
            line-height: 0.9;
        }

        .logo-sub {
            background: var(--habibs-red);
            padding: 5px 20px;
            font-size: 1.2rem;
            letter-spacing: 8px;
            display: inline-block;
            margin-top: 10px;
        }

        /* Booking Form */
        .container { padding: 60px 10%; }
        .booking-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(230, 30, 37, 0.3);
            padding: 40px;
            border-radius: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        .btn-book {
            background: linear-gradient(to right, #e61e25, #800000);
            color: white;
            width: 100%;
            padding: 20px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
        }

        #map { height: 450px; border-radius: 15px; border: 2px solid var(--habibs-red); margin-top: 30px; }
        
        h2 { font-family: 'Syncopate'; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

    <section class="hero">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="salon_video.mp4" type="video/mp4">
        </video>
        <div class="logo-box">
            <div class="logo-main">HABIBS</div>
            <div class="logo-sub">HAIR & BEAUTY</div>
        </div>
    </section>

    <section class="container">
        <h2>RESERVE YOUR SPOT</h2>
        <div class="booking-card">
            <label>Your Name</label>
            <input type="text" id="name" placeholder="Name">
            
            <label>Select Branch</label>
            <select id="branch">
                <option>Bhagwaghar Layout</option>
                <option>Ganeshpeth Colony</option>
                <option>Madhav Nagar</option>
                <option>Telephone Exchange Square</option>
                <option>Trimurti Nagar</option>
                <option>Manish Nagar</option>
                <option>Bajrang Nagar</option>
                <option>Friends Colony</option>
            </select>

            <label>Date & Time</label>
            <div style="display:flex; gap:10px;">
                <input type="date" id="date">
                <input type="time" id="time">
            </div>

            <button class="btn-book" onclick="bookNow()">Confirm Booking</button>
            <div id="callNow" style="display:none; text-align:center; margin-top:20px;">
                <a href="tel:8767695492" style="color:var(--habibs-red); font-size:1.5rem; text-decoration:none;">Call: 8767695492</a>
            </div>
        </div>
    </section>

    <section class="container">
        <h2>LOCATIONS</h2>
        <div id="map"></div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function bookNow() {
            const name = document.getElementById('name').value;
            const branch = document.getElementById('branch').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            if(!name) return alert("Enter Name");
            
            document.getElementById('callNow').style.display = "block";
            const msg = `*RESERVATION*%0AName: ${name}%0ABranch: ${branch}%0ADate: ${date}%0ATime: ${time}`;
            window.open(`https://wa.me/918767695492?text=${msg}`);
        }

        var map = L.map('map').setView([21.1458, 79.0882], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const spots = [
            [21.1408, 79.0700], [21.1444, 79.0910], [21.1255, 79.0667], 
            [21.1485, 79.1150], [21.1150, 79.0470], [21.0960, 79.0820], 
            [21.1120, 79.1120], [21.1680, 79.0480]
        ];

        spots.forEach(pos => {
            L.circleMarker(pos, {color: 'red', radius: 8, fillOpacity: 0.8}).addTo(map);
        });
    </script>
</body>
</html>
